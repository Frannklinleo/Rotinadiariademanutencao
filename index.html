// Ícones (mapeados a partir do build UMD do lucide, expostos em window.lucide.icons
// como componentes prontos via lucide.createElement, então criamos wrappers React)
// ----------------------------------------------------------------------------
function makeIcon(name) {
  return function Icon({ size = 16, strokeWidth = 2, color, style, className }) {
    const ref = useRef(null);
    useEffect(() => {
      if (!ref.current) return;
      ref.current.innerHTML = "";
      try {
        const iconNode = window.lucide && window.lucide.icons && window.lucide.icons[name];
        if (!iconNode) return;
        const svgEl = window.lucide.createElement(iconNode, {
          width: size,
          height: size,
          "stroke-width": strokeWidth,
          ...(color ? { stroke: color } : {}),
        });
        svgEl.style.display = "block";
        ref.current.appendChild(svgEl);
      } catch (e) {
        // Ícone indisponível nesta versão do lucide; falha silenciosa (não bloqueia o app)
      }
    }, [size, strokeWidth, color]);
    return <span ref={ref} className={className} style={{ display: "inline-flex", color, ...style }} />;
  };
}

function formatarDataLonga(d) {
  const dias = [
    "domingo",
    "segunda-feira",
    "terça-feira",
    "quarta-feira",
    "quinta-feira",
    "sexta-feira",
    "sábado",
  ];
  const meses = [
    "janeiro",
    "fevereiro",
    "março",
    "abril",
    "maio",
    "junho",
    "julho",
    "agosto",
    "setembro",
    "outubro",
    "novembro",
    "dezembro",
  ];
  return `${dias[d.getDay()]}, ${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`;
}

function formatarDataCurta(d) {
  const dd = String(d.getDate()).padStart(2, "0");
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const yyyy = d.getFullYear();
  return `${dd}/${mm}/${yyyy}`;
}

function chaveDoDia(d, tipoRotina) {
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `rotina:${tipoRotina}:${yyyy}-${mm}-${dd}`;
}

function estadoInicial(areas) {
  const initial = {};
  areas.forEach((a) => {
    initial[a.id] = {
      checkedItems: new Array(a.itens.length).fill(false),
      comentario: "",
      savedAt: null,
    };
  });
  return initial;
}

// Garante que todo status carregado do storage tenha exatamente as áreas e o formato
// esperados pela rotina atual, mesmo que os dados salvos sejam de uma versão antiga
// ou de uma rotina com áreas diferentes.
function sanitizarStatus(raw, areas) {
  const base = estadoInicial(areas);
  if (!raw || typeof raw !== "object") return base;
  areas.forEach((a) => {
    const salvo = raw[a.id];
    if (!salvo || typeof salvo !== "object") return;
    const checkedItemsSalvos = Array.isArray(salvo.checkedItems) ? salvo.checkedItems : [];
    const checkedItems = a.itens.map((_, idx) => !!checkedItemsSalvos[idx]);
    base[a.id] = {
      checkedItems,
      comentario: typeof salvo.comentario === "string" ? salvo.comentario : "",
      savedAt: typeof salvo.savedAt === "number" ? salvo.savedAt : null,
    };
  });
  return base;
}

function ProgressRing({ progress, size = 44, stroke = 4, color = "#F5A623", track = "rgba(255,255,255,0.08)" }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - progress * c;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="shrink-0">
      <circle cx={size / 2} cy={size / 2} r={r} stroke={track} strokeWidth={stroke} fill="none" />
      <circle
        cx={size / 2}
        cy={size / 2}
        r={r}
        stroke={color}
        strokeWidth={stroke}
        fill="none"
        strokeLinecap="round"
        strokeDasharray={c}
        strokeDashoffset={offset}
        transform={`rotate(-90 ${size / 2} ${size / 2})`}
        style={{ transition: "stroke-dashoffset 400ms cubic-bezier(0.4,0,0.2,1)" }}
      />
    </svg>
  );
}

                  >

                      src={foto.dataUrl}

                    <button

            <div className="flex gap-2">

                  background: tema.accentSoft2,
                  color: tema.accent,

              <button
                onClick={() => fileInputRef.current && fileInputRef.current.click()}

                style={{

            <input

              accept="image/*"

          <div style={{ height: "8px" }} />

        <div className="shrink-0 px-5 pb-5 pt-3" style={{ borderTop: "1px solid rgba(255,255,255,0.06)" }}>

            style={{

  );
}

function MaintenanceApp() {
  const today = useMemo(() => new Date(), []);
  const [tipoRotina, setTipoRotina] = useState("mecanica");
  const rotinaAtual = ROTINAS[tipoRotina];
  const AREAS = rotinaAtual.areas;
  const tema = rotinaAtual.tema;
  const TOTAL_ITENS = useMemo(() => totalItensDe(AREAS), [AREAS]);
  const storageKey = useMemo(() => chaveDoDia(today, tipoRotina), [today, tipoRotina]);

  const [status, setStatus] = useState(() => estadoInicial(AREAS));
  const [openAreaId, setOpenAreaId] = useState(null);
  const [reportOpen, setReportOpen] = useState(false);
  const [photoReportOpen, setPhotoReportOpen] = useState(false);
  const [telefone, setTelefone] = useState("");
  const [loaded, setLoaded] = useState(false);
  const [saveState, setSaveState] = useState("idle"); // idle | saving | saved | error
  const [resetConfirm, setResetConfirm] = useState(false);
  // Fotos ficam só na memória da sessão (não persistidas, para não estourar o
  // limite de armazenamento do navegador e arriscar o progresso do checklist),
  // organizadas por id de área. Resetam ao trocar de rotina/dia ou recarregar a página.
  const [fotosPorArea, setFotosPorArea] = useState({});

  // Limpa as fotos da sessão ao trocar de rotina (mecânica/elétrica têm fotos independentes)
  useEffect(() => {
    setFotosPorArea({});
  }, [storageKey]);

  function fileToDataUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function addFotos(areaId, files) {
    const novas = await Promise.all(
      files.map(async (file) => ({
        id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
        dataUrl: await fileToDataUrl(file),
      }))
    );
    setFotosPorArea((prev) => ({
      ...prev,
      [areaId]: [...(prev[areaId] || []), ...novas],
    }));
  }

  function removeFoto(areaId, fotoId) {
    setFotosPorArea((prev) => ({
      ...prev,
      [areaId]: (prev[areaId] || []).filter((f) => f.id !== fotoId),
    }));
  }

  const totalFotos = useMemo(
    () => Object.values(fotosPorArea).reduce((acc, arr) => acc + (arr ? arr.length : 0), 0),
    [fotosPorArea]
  );

  // Toda vez que troca o tipo de rotina (ou no carregamento inicial), busca o progresso salvo dessa rotina/dia
  const loadedKeyRef = useRef(null);
  const [loadError, setLoadError] = useState(null);
  useEffect(() => {
    setLoaded(false);
    setLoadError(null);
    setOpenAreaId(null);
    try {
      const raw = localStorage.getItem(storageKey);
      if (raw) {
        setStatus(sanitizarStatus(JSON.parse(raw), AREAS));
      } else {
        setStatus(estadoInicial(AREAS));
      }
    } catch (e) {
      console.error("Falha ao carregar progresso salvo:", e);
      setStatus(estadoInicial(AREAS));
      setLoadError(String(e && e.message ? e.message : e));
    } finally {
      loadedKeyRef.current = storageKey;
      setLoaded(true);
    }
  }, [storageKey]);

  // Salva automaticamente a cada mudança de status (depois do carregamento inicial da MESMA chave)
  const saveTimeoutRef = useRef(null);
  useEffect(() => {
    if (!loaded || loadedKeyRef.current !== storageKey) return;
    setSaveState("saving");
    if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
    saveTimeoutRef.current = setTimeout(() => {
      try {
        localStorage.setItem(storageKey, JSON.stringify(status));
        setSaveState("saved");
      } catch (e) {
        console.error("Falha ao salvar progresso:", e);
        setSaveState("error");
      }
    }, 350);
    return () => clearTimeout(saveTimeoutRef.current);
  }, [status, loaded, storageKey]);

  const isReady = loaded && loadedKeyRef.current === storageKey;

  const totalChecked = useMemo(
    () =>
      Object.values(status).reduce(
        (acc, s) => acc + (s && Array.isArray(s.checkedItems) ? s.checkedItems.filter(Boolean).length : 0),
        0
      ),
    [status]
  );
  const areasComObservacao = useMemo(
    () => Object.values(status).filter((s) => s && s.comentario && s.comentario.trim().length > 0).length,
    [status]
  );
  const areasSalvas = useMemo(
    () => Object.values(status).filter((s) => s && s.savedAt != null).length,
    [status]
  );

  const overallProgress = TOTAL_ITENS ? totalChecked / TOTAL_ITENS : 0;

  function toggleItem(areaId, itemIdx) {
    setStatus((prev) => {
      const areaStatus = prev[areaId] || { checkedItems: [], comentario: "", savedAt: null };
      const newChecked = [...areaStatus.checkedItems];
      newChecked[itemIdx] = !newChecked[itemIdx];
      return { ...prev, [areaId]: { ...areaStatus, checkedItems: newChecked } };
    });
  }

  function changeComentario(areaId, texto) {
    setStatus((prev) => ({
      ...prev,
      [areaId]: { ...(prev[areaId] || { checkedItems: [], comentario: "", savedAt: null }), comentario: texto },
    }));
  }

  function saveArea(areaId) {
    setStatus((prev) => ({
      ...prev,
      [areaId]: { ...(prev[areaId] || { checkedItems: [], comentario: "", savedAt: null }), savedAt: Date.now() },
    }));
  }

  function resetarRotina() {
    setStatus(estadoInicial(AREAS));
    setFotosPorArea({});
  }

  const openArea = AREAS.find((a) => a.id === openAreaId);

  const reportText = useMemo(() => {
    const linhas = [];
    linhas.push(`RELATÓRIO DE ROTINA DE MANUTENÇÃO — ${rotinaAtual.label.toUpperCase()}`);
    linhas.push(`Data: ${formatarDataLonga(today)}`);
    linhas.push(`Progresso geral: ${totalChecked}/${TOTAL_ITENS} itens verificados`);
    linhas.push("");

    AREAS.forEach((area, idx) => {
      const s = status[area.id] || { checkedItems: [], comentario: "" };
      const checked = s.checkedItems.filter(Boolean).length;

      if (idx > 0) linhas.push("");

      linhas.push(`*${area.nome}*: "${checked}/${area.itens.length}"`);

      if (s.comentario && s.comentario.trim().length > 0) {
        linhas.push(`> ${s.comentario.trim()}`);
      }
    });

    linhas.push("");
    linhas.push(`Fim do relatório — gerado em ${formatarDataCurta(today)}`);
    return linhas.join("\n");
  }, [status, today, totalChecked, AREAS, rotinaAtual, TOTAL_ITENS]);

  function abrirRelatorioFotos() {
    const areasComFoto = AREAS.filter((a) => (fotosPorArea[a.id] || []).length > 0);
    const win = window.open("", "_blank");
    if (!win) return;

    const blocos = areasComFoto
      .map((area) => {
        const s = status[area.id] || { comentario: "" };
        const fotosHtml = (fotosPorArea[area.id] || [])
          .map(
            (f) => `<img src="${f.dataUrl}" alt="${area.nome}" />`
          )
          .join("");
        const comentarioHtml = s.comentario && s.comentario.trim().length > 0
          ? `<p class="obs">${s.comentario.trim().replace(/</g, "&lt;")}</p>`
          : "";
        return `
          <section>
            <h2>${area.nome}</h2>
            ${comentarioHtml}
            <div class="grid">${fotosHtml}</div>
          </section>`;
      })
      .join("");

    const html = `
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Relatório de fotos — ${rotinaAtual.label}</title>
<style>
  * { box-sizing: border-box; }
  body {

    margin-bottom: 28px;
    page-break-inside: avoid;
  }
  section h2 {
    font-size: 15px;
    background: #14171C;
    color: white;
    display: inline-block;
    padding: 4px 12px;
    border-radius: 6px;
    margin: 0 0 8px;
  }
  .obs {
    font-size: 13px;
    color: #333;
    background: #F4F4F4;
    border-left: 3px solid #999;
    padding: 8px 12px;
    margin: 0 0 10px;
    border-radius: 4px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .grid img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid #ddd;
  }
  @media print {
    body { padding: 12px; }
  }
</style>
</head>
<body>
  <header>
    <h1>Relatório de fotos — Rotina ${rotinaAtual.label}</h1>
    <p>${formatarDataLonga(today)}</p>
    <p>${totalFotos} foto(s) em ${areasComFoto.length} área(s)</p>
  </header>
  ${blocos || '<p>Nenhuma foto anexada ainda.</p>'}
</body>
</html>`;

    win.document.open();
    win.document.write(html);
    win.document.close();
    win.focus();
    setTimeout(() => win.print(), 400);
  }

  function handleSendWhatsapp() {
    const encoded = encodeURIComponent(reportText);
    const base = telefone.trim()
      ? `https://wa.me/55${telefone.replace(/\D/g, "")}`
      : `https://wa.me/`;
    const url = `${base}?text=${encoded}`;
    window.open(url, "_blank");
  }

  if (!isReady) {
    return (
      <div
        className="flex min-h-full w-full items-center justify-center"
        style={{ background: "#0E1116" }}
      >
        <div className="flex flex-col items-center gap-3">
          <div
            className="h-8 w-8 animate-spin rounded-full"
            style={{
              border: `3px solid ${tema.accentRgbLow}`,
              borderTopColor: tema.accent,
            }}
          />
          <span className="text-[13px]" style={{ color: "rgba(255,255,255,0.45)" }}>
            Carregando rotina de hoje...
          </span>
        </div>
      </div>
    );
  }

  return (
    <div
      className="relative min-h-full w-full"
      style={{
        background: "#0E1116",
        fontFamily: "'Inter', -apple-system, sans-serif",
      }}
    >
      {/* Textura sutil de fundo */}
      <div
        className="pointer-events-none fixed inset-0 opacity-[0.4] transition-opacity duration-300"
        style={{
          backgroundImage: `radial-gradient(circle at 15% 0%, ${tema.accentSoft2}, transparent 40%), radial-gradient(circle at 85% 100%, rgba(61,220,132,0.06), transparent 40%)`,
        }}
      />

      <div className="relative mx-auto flex max-w-md flex-col px-4 pb-28 pt-6">
        {/* Seletor de rotina */}
        <div
          className="mb-4 flex rounded-2xl p-1"
          style={{ background: "rgba(28,33,40,0.9)", border: "1px solid rgba(255,255,255,0.07)" }}
        >
          {Object.entries(ROTINAS).map(([key, r]) => {
            const ativo = key === tipoRotina;
            const Icon = key === "mecanica" ? Wrench : Zap;
            return (
              <button

              >
                <Icon size={15} strokeWidth={2.3} />

              <p className="mt-1 text-[11px] font-medium" style={{ color: "#F0997B" }}>
                ⚠ Não foi possível carregar o progresso salvo ({loadError}). Começando do zero.
              </p>
            )}
          </div>
          <div className="flex flex-col items-end gap-1.5">
            <span
              className="flex items-center gap-1.5 text-[10.5px] font-medium"
              style={{
                color:
                  saveState === "error"
                    ? "#F0997B"
                    : saveState === "saving"
                    ? "rgba(255,255,255,0.35)"
                    : saveState === "saved"
                    ? "#3DDC84"
                    : "rgba(255,255,255,0.3)",
              }}
            >
              <span
                className="h-1.5 w-1.5 rounded-full"
                style={{
                  background:
                    saveState === "error"
                      ? "#E24B4A"
                      : saveState === "saving"
                      ? "rgba(255,255,255,0.35)"
                      : saveState === "saved"
                      ? "#3DDC84"
                      : "rgba(255,255,255,0.25)",
                }}
              />
              {saveState === "error"
                ? "Falha ao salvar"
                : saveState === "saving"
                ? "Salvando..."
                : saveState === "saved"
                ? "Progresso salvo"
                : "Pronto"}
            </span>
            <button
              onClick={() => setResetConfirm(true)}
              className="text-[10.5px] font-medium underline"
              style={{ color: "rgba(255,255,255,0.3)" }}
            >
              Reiniciar rotina
            </button>
          </div>
        </div>

        {/* Painel de progresso geral */}
        <div
          className="mb-5 flex items-center gap-4 rounded-2xl p-4"
          style={{
            background: "rgba(28,33,40,0.9)",
            border: "1px solid rgba(255,255,255,0.07)",
          }}
        >
          <ProgressRing progress={overallProgress} size={56} stroke={5} color={tema.accent} />
          <div className="flex-1">
            <div className="text-[18px] font-bold text-white">
              {totalChecked}/{TOTAL_ITENS}
              <span className="ml-1.5 text-[12px] font-normal" style={{ color: "rgba(255,255,255,0.4)" }}>
                itens verificados
              </span>
            </div>
            <div className="mt-1 flex gap-3 text-[11.5px]" style={{ color: "rgba(255,255,255,0.45)" }}>
              <span className="flex items-center gap-1">
                <CheckCircle2 size={12} style={{ color: "#3DDC84" }} />
                {areasSalvas} áreas concluídas
              </span>
              <span className="flex items-center gap-1">
                <MessageSquarePlus size={12} style={{ color: tema.accent }} />
                {areasComObservacao} c/ observações
              </span>
            </div>
          </div>
        </div>

        {/* Grid de áreas */}
        <div className="grid grid-cols-2 gap-3">
          {AREAS.map((area) => (
            <AreaCard
              key={area.id}
              area={area}
              status={status[area.id]}
              onOpen={setOpenAreaId}
              tema={tema}
              fotoCount={(fotosPorArea[area.id] || []).length}
            />
          ))}
        </div>
      </div>

      {/* Botões flutuantes de gerar relatório */}
      <div className="fixed inset-x-0 bottom-0 z-40 mx-auto flex max-w-md justify-center gap-2 px-4 pb-5">
        <button
          onClick={() => setReportOpen(true)}
          className="flex flex-1 items-center justify-center gap-2 rounded-2xl py-4 text-[14.5px] font-semibold shadow-2xl transition-all active:scale-[0.98] duration-300"
          style={{
            background: tema.gradient,
            color: "#14171C",
            boxShadow: `0 8px 30px ${tema.glow}`,
          }}
        >
          <FileText size={17} strokeWidth={2.3} />
          Relatório de texto
        </button>
        <button
          onClick={abrirRelatorioFotos}
          disabled={totalFotos === 0}
          className="flex items-center justify-center gap-2 rounded-2xl px-4 py-4 text-[14.5px] font-semibold shadow-2xl transition-all active:scale-[0.98] duration-300"
          style={{
            background: totalFotos === 0 ? "rgba(255,255,255,0.06)" : "rgba(28,33,40,0.95)",
            color: totalFotos === 0 ? "rgba(255,255,255,0.3)" : "white",
            border: "1px solid rgba(255,255,255,0.12)",
          }}
        >
          <ImageIcon size={17} strokeWidth={2.3} />
          {totalFotos > 0 ? totalFotos : ""}
        </button>
      </div>

      {/* Modais */}
      {openArea && status[openArea.id] && (
        <AreaModal
          area={openArea}
          status={status[openArea.id]}
          onClose={() => setOpenAreaId(null)}
          onToggleItem={toggleItem}
          onChangeComentario={changeComentario}
          onSave={saveArea}
          tema={tema}
          fotos={fotosPorArea[openArea.id]}
          onAddFotos={addFotos}
          onRemoveFoto={removeFoto}
        />
      )}

      <ReportModal
        open={reportOpen}
        onClose={() => setReportOpen(false)}
        reportText={reportText}
        onSendWhatsapp={handleSendWhatsapp}
        telefone={telefone}
        setTelefone={setTelefone}
      />

      {resetConfirm && (
        <div
          className="fixed inset-0 z-50 flex items-center justify-center px-6"
          style={{ background: "rgba(8,10,13,0.75)", backdropFilter: "blur(4px)" }}
          onClick={() => setResetConfirm(false)}
        >
          <div
            onClick={(e) => e.stopPropagation()}
            className="w-full max-w-sm rounded-2xl p-5"
            style={{ background: "#181B21", border: "1px solid rgba(255,255,255,0.08)" }}
          >
            <div className="mb-3 flex items-center gap-2.5">
              <div
                className="flex h-9 w-9 items-center justify-center rounded-xl"
                style={{ background: "rgba(226,75,74,0.14)", color: "#E24B4A" }}
              >
                <AlertTriangle size={17} />
              </div>
              <h3 className="text-[15px] font-semibold text-white">
                Reiniciar rotina {rotinaAtual.label.toLowerCase()} de hoje?
              </h3>
            </div>
            <p className="mb-4 text-[13px] leading-relaxed" style={{ color: "rgba(255,255,255,0.55)" }}>
              Todos os itens marcados e observações de hoje na rotina <strong>{rotinaAtual.label.toLowerCase()}</strong> serão apagados. A outra rotina não é afetada. Essa ação não pode ser desfeita.
            </p>
            <div className="flex gap-2">
              <button
                onClick={() => setResetConfirm(false)}
                className="flex-1 rounded-xl py-2.5 text-[13px] font-medium"
                style={{ background: "rgba(255,255,255,0.06)", color: "rgba(255,255,255,0.8)" }}
              >
                Cancelar
              </button>
              <button
                onClick={() => {
                  resetarRotina();
                  setResetConfirm(false);
                }}
                className="flex-1 rounded-xl py-2.5 text-[13px] font-semibold"
                style={{ background: "#E24B4A", color: "white" }}
              >
                Reiniciar
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(<MaintenanceApp />);
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
</script>
</body>
</html>
