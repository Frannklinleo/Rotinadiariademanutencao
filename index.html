// ----------------------------------------------------------------------------
// Ícones (mapeados a partir do build UMD do lucide, expostos em window.lucide.icons
// como componentes prontos via lucide.createElement, então criamos wrappers React)
// ----------------------------------------------------------------------------
function makeIcon(name) {
  return function Icon({ size = 16, strokeWidth = 2, color, style, className }) {
    const ref = useRef(null);
    useEffect(() => {
      if (!ref.current) return;
      ref.current.innerHTML = "";
      try {
        const iconNode = window.lucide && window.lucide.icons && window.lucide.icons[name];
        if (!iconNode) return;
        const svgEl = window.lucide.createElement(iconNode, {
          width: size,
          height: size,
          "stroke-width": strokeWidth,
          ...(color ? { stroke: color } : {}),
        });
        svgEl.style.display = "block";
        ref.current.appendChild(svgEl);
      } catch (e) {
        // Ícone indisponível nesta versão do lucide; falha silenciosa (não bloqueia o app)
      }
    }, [size, strokeWidth, color]);
    return <span ref={ref} className={className} style={{ display: "inline-flex", color, ...style }} />;
  };
}

const supaHeaders = {
  "Content-Type": "application/json",
  "apikey": SUPA_KEY,
  "Authorization": `Bearer ${SUPA_KEY}`,
  "Prefer": "return=representation",
};

async function supaFetch(path, opts = {}) {
  const res = await fetch(`${SUPA_URL}/rest/v1${path}`, {
    ...opts,
    headers: { ...supaHeaders, ...(opts.headers || {}) },
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Supabase error ${res.status}: ${err}`);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// Busca usuário por nome+sobrenome, retorna null se não existir
async function supaGetUsuario(nome, sobrenome) {
  const rows = await supaFetch(
    `/usuarios?nome=eq.${encodeURIComponent(nome)}&sobrenome=eq.${encodeURIComponent(sobrenome)}&limit=1`
  );
  return rows && rows.length > 0 ? rows[0] : null;
}

// Cria usuário novo, retorna o registro criado
async function supaCreateUsuario(nome, sobrenome, senha) {
  const rows = await supaFetch("/usuarios", {
    method: "POST",
    body: JSON.stringify({ nome, sobrenome, senha }),
  });
  return rows && rows.length > 0 ? rows[0] : null;
}

// Upsert de um registro de área (por usuario_id + tipo_rotina + data + area_id)
async function supaUpsertRegistro(registro) {
  return supaFetch("/registros_diarios", {
    method: "POST",
    headers: { "Prefer": "resolution=merge-duplicates,return=representation" },
    body: JSON.stringify(registro),
  });
}

// Busca todos os registros de uma data específica (todos os usuários, todas as rotinas)
async function supaGetRegistrosDia(dataISO) {
  return supaFetch(`/registros_diarios?data=eq.${dataISO}&order=usuario_nome.asc,tipo_rotina.asc,area_id.asc`);
}

    tema: TEMAS.eletrica,
  },
};

function totalItensDe(areas) {
  return areas.reduce((acc, a) => acc + a.itens.length, 0);
}

// Um item de checklist pode ser uma string simples (checkbox) ou um objeto
// estruturado { label, campos: [{ id, label, tipo, ... }] } com inputs/selects.
// Esta função decide, para os dois formatos, se o item já está "completo".
function itemEstaCompleto(item, idx, status) {
  if (typeof item === "string") {
    return !!(status && status.checkedItems && status.checkedItems[idx]);
  }
  const valores = (status && status.valores) || {};
  return item.campos.every((c) => (valores[c.id] || "").toString().trim().length > 0);
}

// HELPERS

function formatarDataLonga(d) {
  const dias = [
    "domingo",
    "segunda-feira",
    "terça-feira",
    "quarta-feira",
    "quinta-feira",
    "sexta-feira",
    "sábado",
  ];
  const meses = [
    "janeiro",
    "fevereiro",
    "março",
    "abril",
    "maio",
    "junho",
    "julho",
    "agosto",
    "setembro",
    "outubro",
    "novembro",
    "dezembro",
  ];
  return `${dias[d.getDay()]}, ${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`;
}

function formatarDataCurta(d) {
  const dd = String(d.getDate()).padStart(2, "0");
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const yyyy = d.getFullYear();
  return `${dd}/${mm}/${yyyy}`;
}

function chaveDoDia(d, tipoRotina) {
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `rotina:${tipoRotina}:${yyyy}-${mm}-${dd}`;
}

function estadoInicial(areas) {
  const initial = {};
  areas.forEach((a) => {
    initial[a.id] = {
      checkedItems: new Array(a.itens.length).fill(false),
      valores: {},
      comentario: "",
      savedAt: null,
    };
  });
  return initial;
}

// Garante que todo status carregado do storage tenha exatamente as áreas e o formato
// esperados pela rotina atual, mesmo que os dados salvos sejam de uma versão antiga
// ou de uma rotina com áreas diferentes.
function sanitizarStatus(raw, areas) {
  const base = estadoInicial(areas);
  if (!raw || typeof raw !== "object") return base;
  areas.forEach((a) => {
    const salvo = raw[a.id];
    if (!salvo || typeof salvo !== "object") return;
    const checkedItemsSalvos = Array.isArray(salvo.checkedItems) ? salvo.checkedItems : [];
    const checkedItems = a.itens.map((_, idx) => !!checkedItemsSalvos[idx]);
    const valoresSalvos = salvo.valores && typeof salvo.valores === "object" ? salvo.valores : {};
    base[a.id] = {
      checkedItems,
      valores: { ...valoresSalvos },
      comentario: typeof salvo.comentario === "string" ? salvo.comentario : "",
      savedAt: typeof salvo.savedAt === "number" ? salvo.savedAt : null,
    };
  });
  return base;
}

// ----------------------------------------------------------------------------
// COMPONENTE: anel de progresso (SVG)
// ----------------------------------------------------------------------------

function ProgressRing({ progress, size = 44, stroke = 4, color = "#F5A623", track = "rgba(255,255,255,0.08)" }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - progress * c;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} className="shrink-0">
      <circle cx={size / 2} cy={size / 2} r={r} stroke={track} strokeWidth={stroke} fill="none" />
      <circle
        cx={size / 2}
        cy={size / 2}
        r={r}
        stroke={color}
        strokeWidth={stroke}
        fill="none"
        strokeLinecap="round"
        strokeDasharray={c}
        strokeDashoffset={offset}
        transform={`rotate(-90 ${size / 2} ${size / 2})`}
        style={{ transition: "stroke-dashoffset 400ms cubic-bezier(0.4,0,0.2,1)" }}
      />
    </svg>
  );
}

function LoginModal({ onLogin }) {
  const [step, setStep] = useState("login"); // "login" | "cadastro"
  // Cadastro
  const [nome, setNome] = useState("");
  const [sobrenome, setSobrenome] = useState("");
  // Login
  const [nomeLogin, setNomeLogin] = useState(() => {
    const salvo = JSON.parse(localStorage.getItem("usuario_rotina") || "null");
    return salvo ? salvo.nome || "" : "";
  });
  const [sobrenomeLogin, setSobrenomeLogin] = useState(() => {
    const salvo = JSON.parse(localStorage.getItem("usuario_rotina") || "null");
    return salvo ? salvo.sobrenome || "" : "";
  });
  const [senha, setSenha] = useState("");
  const [confirmarSenha, setConfirmarSenha] = useState("");
  const [salvarSenha, setSalvarSenha] = useState(true);
  const [erro, setErro] = useState("");
  const [animando, setAnimando] = useState(false);
  const [carregando, setCarregando] = useState(false);
  const senhaRef = useRef(null);
  const confirmarRef = useRef(null);

  const senhaInputs = [0, 1, 2, 3];

  function confirmar(u) {
    setAnimando(true);
    setTimeout(() => onLogin(u), 350);
  }

  function handleSenhaDigito(idx, val) {
    if (!/^\d?$/.test(val)) return;
    const arr = senha.split("");
    arr[idx] = val;
    const nova = arr.join("").slice(0, 4);
    setSenha(nova);
    if (val && idx < 3) {
      const inputs = senhaRef.current.querySelectorAll("input");
      if (inputs[idx + 1]) inputs[idx + 1].focus();
    }
  }

  function handleConfirmarDigito(idx, val) {
    if (!/^\d?$/.test(val)) return;
    const arr = confirmarSenha.split("");
    arr[idx] = val;
    const nova = arr.join("").slice(0, 4);
    setConfirmarSenha(nova);
    if (val && idx < 3) {
      const inputs = confirmarRef.current.querySelectorAll("input");
      if (inputs[idx + 1]) inputs[idx + 1].focus();
    }
  }

  function handleKeyDownSenha(idx, e, isCadastro) {
    if (e.key === "Backspace" && !senha[idx] && idx > 0) {
      const container = isCadastro ? senhaRef.current : senhaRef.current;
      const prev = container.querySelectorAll("input")[idx - 1];
      if (prev) { prev.focus(); const arr = senha.split(""); arr[idx - 1] = ""; setSenha(arr.join("")); }
    }
  }

  function handleKeyDownConfirmar(idx, e) {
    if (e.key === "Backspace" && !confirmarSenha[idx] && idx > 0) {
      const prev = confirmarRef.current.querySelectorAll("input")[idx - 1];
      if (prev) { prev.focus(); const arr = confirmarSenha.split(""); arr[idx - 1] = ""; setConfirmarSenha(arr.join("")); }
    }
  }

  async function entrar() {
    setErro("");
    setCarregando(true);
    try {
      // Tenta buscar no Supabase primeiro
      let usuarioDb = null;
      try { usuarioDb = await supaGetUsuario(nomeLogin, sobrenomeLogin); } catch (_) {}

      if (usuarioDb) {
        if (senha !== usuarioDb.senha) { setErro("Senha incorreta."); setSenha(""); setCarregando(false); return; }
        // Salva cache local para auto-login e offline
        localStorage.setItem("usuario_rotina", JSON.stringify({ id: usuarioDb.id, nome: usuarioDb.nome, sobrenome: usuarioDb.sobrenome, senha }));
        if (salvarSenha) localStorage.setItem("usuario_sessao", JSON.stringify({ id: usuarioDb.id, nome: usuarioDb.nome, sobrenome: usuarioDb.sobrenome }));
        confirmar({ id: usuarioDb.id, nome: usuarioDb.nome, sobrenome: usuarioDb.sobrenome });
      } else {
        // Fallback offline
        const salvo = JSON.parse(localStorage.getItem("usuario_rotina") || "null");
        if (!salvo) { setErro("Usuário não encontrado. Verifique o nome ou faça o cadastro."); setCarregando(false); return; }
        if (salvo.nome.toLowerCase() !== nomeLogin.toLowerCase() || salvo.sobrenome.toLowerCase() !== sobrenomeLogin.toLowerCase()) {
          setErro("Usuário não encontrado."); setCarregando(false); return;
        }
        if (senha !== salvo.senha) { setErro("Senha incorreta."); setSenha(""); setCarregando(false); return; }
        if (salvarSenha) localStorage.setItem("usuario_sessao", JSON.stringify(salvo));
        confirmar(salvo);
      }
    } catch (e) {
      setErro("Erro de conexão. Verifique sua internet.");
    }
    setCarregando(false);
  }

  async function cadastrar() {
    setErro("");
    if (!nome.trim() || !sobrenome.trim()) { setErro("Preencha nome e sobrenome."); return; }
    if (senha.length !== 4) { setErro("A senha deve ter 4 dígitos."); return; }
    if (senha !== confirmarSenha) { setErro("As senhas não coincidem."); return; }
    setCarregando(true);
    try {
      // Verifica se usuário já existe
      let existe = null;
      try { existe = await supaGetUsuario(nome.trim(), sobrenome.trim()); } catch (_) {}
      if (existe) { setErro("Já existe um usuário com este nome. Faça login."); setCarregando(false); return; }

      let novoUsuario = null;
      try { novoUsuario = await supaCreateUsuario(nome.trim(), sobrenome.trim(), senha); } catch (_) {}

      const dadosUsuario = novoUsuario
        ? { id: novoUsuario.id, nome: novoUsuario.nome, sobrenome: novoUsuario.sobrenome }
        : { id: null, nome: nome.trim(), sobrenome: sobrenome.trim() };

      localStorage.setItem("usuario_rotina", JSON.stringify({ ...dadosUsuario, senha }));
      if (salvarSenha) localStorage.setItem("usuario_sessao", JSON.stringify(dadosUsuario));
      confirmar(dadosUsuario);
    } catch (e) {
      setErro("Erro ao cadastrar. Verifique sua conexão.");
    }
    setCarregando(false);
  }

  const inputStyle = {
    background: "rgba(255,255,255,0.06)",
    border: "1px solid rgba(255,255,255,0.12)",
    color: "white",
    outline: "none",
  };

  return (
    <div
      className="fixed inset-0 z-50 flex items-center justify-center p-5"
      style={{ background: "rgba(8,10,13,0.92)", backdropFilter: "blur(12px)" }}
    >
      <div
        className="w-full max-w-sm rounded-3xl p-6 transition-all duration-350"
        style={{
          background: "rgba(20,23,28,0.98)",
          border: "1px solid rgba(255,255,255,0.1)",
          boxShadow: "0 32px 80px rgba(0,0,0,0.6)",
          transform: animando ? "scale(0.92)" : "scale(1)",
          opacity: animando ? 0 : 1,
        }}
      >
        {/* Logo / ícone */}
        <div className="mb-5 flex flex-col items-center gap-2">
          <div
            className="flex h-14 w-14 items-center justify-center rounded-2xl"
            style={{ background: "rgba(245,166,35,0.12)", border: "1px solid rgba(245,166,35,0.25)" }}
          >
            <ClipboardList size={26} color="#F5A623" strokeWidth={2} />
          </div>
          <div className="text-center">
            <h2 className="text-[17px] font-bold text-white">Rotina de Manutenção</h2>
            <p className="text-[12px]" style={{ color: "rgba(255,255,255,0.4)" }}>
              {step === "login" ? "Bem-vindo de volta" : "Crie seu acesso"}
            </p>
          </div>
        </div>

        {step === "cadastro" && (
          <div className="mb-3 flex gap-2">
            <div className="flex-1">
              <label className="mb-1 block text-[11px] font-medium uppercase tracking-wide" style={{ color: "rgba(255,255,255,0.4)" }}>Nome</label>
              <input
                type="text"
                value={nome}
                onChange={(e) => setNome(e.target.value)}
                placeholder="Leonardo"
                className="w-full rounded-xl px-3 py-2.5 text-[14px]"
                style={inputStyle}
              />
            </div>
            <div className="flex-1">
              <label className="mb-1 block text-[11px] font-medium uppercase tracking-wide" style={{ color: "rgba(255,255,255,0.4)" }}>Sobrenome</label>
              <input
                type="text"
                value={sobrenome}
                onChange={(e) => setSobrenome(e.target.value)}
                placeholder="Silva"
                className="w-full rounded-xl px-3 py-2.5 text-[14px]"
                style={inputStyle}
              />
            </div>
          </div>
        )}

        {step === "login" && (
          <div className="mb-3 flex gap-2">
            <div className="flex-1">
              <label className="mb-1 block text-[11px] font-medium uppercase tracking-wide" style={{ color: "rgba(255,255,255,0.4)" }}>Nome</label>
              <input
                type="text"
                value={nomeLogin}
                onChange={(e) => setNomeLogin(e.target.value)}
                placeholder="Leonardo"
                className="w-full rounded-xl px-3 py-2.5 text-[14px]"
                style={inputStyle}
              />
            </div>
            <div className="flex-1">
              <label className="mb-1 block text-[11px] font-medium uppercase tracking-wide" style={{ color: "rgba(255,255,255,0.4)" }}>Sobrenome</label>
              <input
                type="text"
                value={sobrenomeLogin}
                onChange={(e) => setSobrenomeLogin(e.target.value)}
                placeholder="Franklin"
                className="w-full rounded-xl px-3 py-2.5 text-[14px]"
                style={inputStyle}
              />
            </div>
          </div>
        )}

        {/* PIN de senha */}
        <div className="mb-4">
          <label className="mb-2 block text-[11px] font-medium uppercase tracking-wide" style={{ color: "rgba(255,255,255,0.4)" }}>
            {step === "cadastro" ? "Criar senha (4 dígitos)" : "Senha (4 dígitos)"}
          </label>
          <div ref={senhaRef} className="flex justify-center gap-3">
            {senhaInputs.map((idx) => (
              <input
                key={idx}
                type="password"
                inputMode="numeric"
                maxLength={1}
                value={senha[idx] || ""}
                onChange={(e) => handleSenhaDigito(idx, e.target.value)}
                onKeyDown={(e) => handleKeyDownSenha(idx, e, step === "cadastro")}
                className="h-12 w-12 rounded-xl text-center text-[20px] font-bold"
                style={{
                  ...inputStyle,
                  border: senha[idx] ? "1.5px solid rgba(245,166,35,0.6)" : "1px solid rgba(255,255,255,0.12)",
                }}
              />
            ))}
          </div>
        </div>

        {step === "cadastro" && (
          <div className="mb-4">
            <label className="mb-2 block text-[11px] font-medium uppercase tracking-wide" style={{ color: "rgba(255,255,255,0.4)" }}>
              Confirmar senha
            </label>
            <div ref={confirmarRef} className="flex justify-center gap-3">
              {senhaInputs.map((idx) => (
                <input
                  key={idx}
                  type="password"
                  inputMode="numeric"
                  maxLength={1}
                  value={confirmarSenha[idx] || ""}
                  onChange={(e) => handleConfirmarDigito(idx, e.target.value)}
                  onKeyDown={(e) => handleKeyDownConfirmar(idx, e)}
                  className="h-12 w-12 rounded-xl text-center text-[20px] font-bold"
                  style={{
                    ...inputStyle,
                    border: confirmarSenha[idx] ? "1.5px solid rgba(245,166,35,0.6)" : "1px solid rgba(255,255,255,0.12)",
                  }}
                />
              ))}
            </div>
          </div>
        )}

        {/* Salvar senha */}
        <button
          onClick={() => setSalvarSenha(!salvarSenha)}
          className="mb-4 flex w-full items-center gap-2.5"
        >
          <span
            className="flex h-5 w-5 shrink-0 items-center justify-center rounded-md transition-colors"
            style={{
              background: salvarSenha ? "#F5A623" : "transparent",
              border: salvarSenha ? "none" : "1.5px solid rgba(255,255,255,0.25)",
            }}
          >
            {salvarSenha && <Check size={13} strokeWidth={3} color="#0E1116" />}
          </span>
          <span className="text-[12.5px]" style={{ color: "rgba(255,255,255,0.6)" }}>
            Salvar acesso neste dispositivo
          </span>
        </button>

        {erro && (
          <div className="mb-3 flex items-center gap-2 rounded-xl px-3 py-2" style={{ background: "rgba(240,153,123,0.12)", border: "1px solid rgba(240,153,123,0.25)" }}>
            <AlertTriangle size={13} color="#F0997B" />
            <p className="text-[12px]" style={{ color: "#F0997B" }}>{erro}</p>
          </div>
        )}

        <button
          onClick={step === "login" ? entrar : cadastrar}
          disabled={carregando}
          className="mb-3 w-full rounded-2xl py-3.5 text-[14.5px] font-semibold transition-all active:scale-[0.98]"
          style={{
            background: carregando ? "rgba(245,166,35,0.5)" : "linear-gradient(135deg, #F5A623, #E8940F)",
            color: "#0E1116",
            opacity: carregando ? 0.8 : 1,
          }}
        >
          {carregando ? "Aguarde..." : step === "login" ? "Entrar" : "Criar acesso e entrar"}
        </button>

        <button
          onClick={() => { setStep(step === "login" ? "cadastro" : "login"); setErro(""); setSenha(""); setConfirmarSenha(""); }}
          className="w-full py-2 text-[12.5px] text-center transition-colors"
          style={{ color: "rgba(255,255,255,0.4)" }}
        >
          {step === "login" ? "Primeiro acesso? Cadastrar" : "Já tenho acesso → Entrar"}
        </button>
      </div>
    </div>
  );
}

function MaintenanceApp() {
  const today = useMemo(() => new Date(), []);
  const [tipoRotina, setTipoRotina] = useState("mecanica");
  const rotinaAtual = ROTINAS[tipoRotina];
  const AREAS = rotinaAtual.areas;
  const tema = rotinaAtual.tema;
  const TOTAL_ITENS = useMemo(() => totalItensDe(AREAS), [AREAS]);
  const storageKey = useMemo(() => chaveDoDia(today, tipoRotina), [today, tipoRotina]);

  // ── Usuário e auto-login ──────────────────────────────────────────────────
  const [usuario, setUsuario] = useState(() => {
    return JSON.parse(localStorage.getItem("usuario_sessao") || "null");
  });

  const saudacao = useMemo(() => {
    const h = today.getHours();
    if (h < 12) return "Bom dia";
    if (h < 18) return "Boa tarde";
    return "Boa noite";
  }, [today]);

  // Resumo do dia anterior — lê do localStorage pelo par de rotinas
  const resumoDiaAnterior = useMemo(() => {
    const ontem = new Date(today);
    ontem.setDate(ontem.getDate() - 1);
    const yyyy = ontem.getFullYear();
    const mm = String(ontem.getMonth() + 1).padStart(2, "0");
    const dd = String(ontem.getDate()).padStart(2, "0");
    const resumo = {};
    ["mecanica", "eletrica"].forEach((tipo) => {
      const chave = `rotina:${tipo}:${yyyy}-${mm}-${dd}`;
      try {
        const raw = localStorage.getItem(chave);
        if (!raw) return;
        const dados = JSON.parse(raw);
        const areas = tipo === "mecanica" ? AREAS_MECANICA : AREAS_ELETRICA;
        const total = totalItensDe(areas);
        const concluidos = areas.reduce((acc, a) => {
          const s = dados[a.id];
          if (!s) return acc;
          return acc + a.itens.filter((item, idx) => itemEstaCompleto(item, idx, s)).length;
        }, 0);
        resumo[tipo] = { concluidos, total, percentual: total ? Math.round((concluidos / total) * 100) : 0 };
      } catch (_) {}
    });
    return resumo;
  }, [today]);

  const [status, setStatus] = useState(() => estadoInicial(AREAS));
  const [openAreaId, setOpenAreaId] = useState(null);
  const [reportOpen, setReportOpen] = useState(false);
  const [photoReportOpen, setPhotoReportOpen] = useState(false);
  const [reportOntemOpen, setReportOntemOpen] = useState(false);
  const [reportTextOntem, setReportTextOntem] = useState(null);
  const [carregandoOntem, setCarregandoOntem] = useState(false);

  // Busca registros de ontem do Supabase (todos os usuários) quando o app carrega
  useEffect(() => {
    const ontem = new Date(today);
    ontem.setDate(ontem.getDate() - 1);
    const yyyy = ontem.getFullYear();
    const mm = String(ontem.getMonth() + 1).padStart(2, "0");
    const dd = String(ontem.getDate()).padStart(2, "0");
    const dataISO = `${yyyy}-${mm}-${dd}`;

    async function buscarOntem() {
      setCarregandoOntem(true);
      try {
        const registros = await supaGetRegistrosDia(dataISO);
        if (!registros || registros.length === 0) { setReportTextOntem(null); setCarregandoOntem(false); return; }

        // Agrupa por usuário → rotina → áreas
        const porUsuario = {};
        registros.forEach((r) => {
          const chave = r.usuario_nome;
          if (!porUsuario[chave]) porUsuario[chave] = {};
          if (!porUsuario[chave][r.tipo_rotina]) porUsuario[chave][r.tipo_rotina] = [];
          porUsuario[chave][r.tipo_rotina].push(r);
        });

        const linhas = [];
        linhas.push(`RESUMO DO DIA ANTERIOR — ${formatarDataLonga(ontem).toUpperCase()}`);
        linhas.push("");

        Object.entries(porUsuario).forEach(([nomeUsuario, rotinas], uIdx) => {
          if (uIdx > 0) linhas.push("");
          linhas.push(`👤 *${nomeUsuario}*`);

          Object.entries(rotinas).forEach(([rotina, areas]) => {
            const labelRotina = rotina === "mecanica" ? "Mecânica" : rotina === "eletrica" ? "Elétrica" : "Start up";
            const totalItens = areas.reduce((acc, r) => acc + (r.checked_items ? r.checked_items.length : 0), 0);
            const checkedItens = areas.reduce((acc, r) => acc + (r.checked_items ? r.checked_items.filter(Boolean).length : 0), 0);

            linhas.push(`  *${labelRotina}*: "${checkedItens}/${totalItens}"`);

            areas.forEach((r) => {
              // Valores estruturados (queimadores, bombas, etc.)
              const valores = r.valores || {};
              const valoresFmt = Object.entries(valores)
                .filter(([, v]) => v && v.toString().trim())
                .map(([k, v]) => `${k}: ${v}`)
                .join(", ");
              if (valoresFmt) linhas.push(`  > ${r.area_nome}: ${valoresFmt}`);
              if (r.comentario && r.comentario.trim()) linhas.push(`  > ${r.area_nome}: ${r.comentario.trim()}`);
            });
          });
        });

        linhas.push("");
        linhas.push(`Gerado em ${formatarDataCurta(today)}`);
        setReportTextOntem(linhas.join("\n"));
      } catch (_) {
        // Fallback: tenta o localStorage local (apenas do usuário atual)
        const ontemObj = new Date(today);
        ontemObj.setDate(ontemObj.getDate() - 1);
        const yyyy2 = ontemObj.getFullYear();
        const mm2 = String(ontemObj.getMonth() + 1).padStart(2, "0");
        const dd2 = String(ontemObj.getDate()).padStart(2, "0");
        const resumo = {};
        ["mecanica", "eletrica"].forEach((tipo) => {
          try {
            const raw = localStorage.getItem(`rotina:${tipo}:${yyyy2}-${mm2}-${dd2}`);
            if (raw) {
              const dados = JSON.parse(raw);
              const areas = tipo === "mecanica" ? AREAS_MECANICA : AREAS_ELETRICA;
              const total = totalItensDe(areas);
              const concluidos = areas.reduce((acc, a) => {
                const s = dados[a.id];
                return acc + (s ? a.itens.filter((item, idx) => itemEstaCompleto(item, idx, s)).length : 0);
              }, 0);
              resumo[tipo] = { concluidos, total };
            }
          } catch (_2) {}
        });
        if (Object.keys(resumo).length > 0) {
          const ls = [`RESUMO DE ONTEM (offline) — ${formatarDataLonga(ontem).toUpperCase()}`, ""];
          if (resumo.mecanica) ls.push(`*Mecânica*: "${resumo.mecanica.concluidos}/${resumo.mecanica.total}"`);
          if (resumo.eletrica) ls.push(`*Elétrica*: "${resumo.eletrica.concluidos}/${resumo.eletrica.total}"`);
          setReportTextOntem(ls.join("\n"));
        } else {
          setReportTextOntem(null);
        }
      }
      setCarregandoOntem(false);
    }

    buscarOntem();
  }, [today]);
  const [telefone, setTelefone] = useState("");
  const [loaded, setLoaded] = useState(false);
  const [saveState, setSaveState] = useState("idle"); // idle | saving | saved | error
  const [resetConfirm, setResetConfirm] = useState(false);
  // Fotos ficam só na memória da sessão (não persistidas, para não estourar o
  // limite de armazenamento do navegador e arriscar o progresso do checklist),
  // organizadas por id de área. Resetam ao trocar de rotina/dia ou recarregar a página.
  const [fotosPorArea, setFotosPorArea] = useState({});

  // Limpa as fotos da sessão ao trocar de rotina (mecânica/elétrica têm fotos independentes)
  useEffect(() => {
    setFotosPorArea({});
  }, [storageKey]);

  function fileToDataUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function addFotos(areaId, files) {
    const novas = await Promise.all(
      files.map(async (file) => ({
        id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
        dataUrl: await fileToDataUrl(file),
      }))
    );
    setFotosPorArea((prev) => ({
      ...prev,
      [areaId]: [...(prev[areaId] || []), ...novas],
    }));
  }

  function removeFoto(areaId, fotoId) {
    setFotosPorArea((prev) => ({
      ...prev,
      [areaId]: (prev[areaId] || []).filter((f) => f.id !== fotoId),
    }));
  }

  const totalFotos = useMemo(
    () => Object.values(fotosPorArea).reduce((acc, arr) => acc + (arr ? arr.length : 0), 0),
    [fotosPorArea]
  );

  // Toda vez que troca o tipo de rotina (ou no carregamento inicial), busca o progresso salvo dessa rotina/dia
  const loadedKeyRef = useRef(null);
  const [loadError, setLoadError] = useState(null);
  useEffect(() => {
    setLoaded(false);
    setLoadError(null);
    setOpenAreaId(null);
    try {
      const raw = localStorage.getItem(storageKey);
      if (raw) {
        setStatus(sanitizarStatus(JSON.parse(raw), AREAS));
      } else {
        setStatus(estadoInicial(AREAS));
      }
    } catch (e) {
      console.error("Falha ao carregar progresso salvo:", e);
      setStatus(estadoInicial(AREAS));
      setLoadError(String(e && e.message ? e.message : e));
    } finally {
      loadedKeyRef.current = storageKey;
      setLoaded(true);
    }
  }, [storageKey]);

  // Salva automaticamente a cada mudança de status (depois do carregamento inicial da MESMA chave)
  const saveTimeoutRef = useRef(null);
  useEffect(() => {
    if (!loaded || loadedKeyRef.current !== storageKey) return;
    setSaveState("saving");
    if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
    saveTimeoutRef.current = setTimeout(() => {
      try {
        localStorage.setItem(storageKey, JSON.stringify(status));
        setSaveState("saved");
      } catch (e) {
        console.error("Falha ao salvar progresso:", e);
        setSaveState("error");
      }
    }, 350);
    return () => clearTimeout(saveTimeoutRef.current);
  }, [status, loaded, storageKey]);

  const isReady = loaded && loadedKeyRef.current === storageKey;

  const totalChecked = useMemo(
    () =>
      AREAS.reduce((acc, a) => {
        const s = status[a.id];
        if (!s) return acc;
        return acc + a.itens.filter((item, idx) => itemEstaCompleto(item, idx, s)).length;
      }, 0),
    [status, AREAS]
  );
  const areasComObservacao = useMemo(
    () => Object.values(status).filter((s) => s && s.comentario && s.comentario.trim().length > 0).length,
    [status]
  );
  const areasSalvas = useMemo(
    () => Object.values(status).filter((s) => s && s.savedAt != null).length,
    [status]
  );

  const overallProgress = TOTAL_ITENS ? totalChecked / TOTAL_ITENS : 0;

  function toggleItem(areaId, itemIdx) {
    setStatus((prev) => {
      const areaStatus = prev[areaId] || { checkedItems: [], valores: {}, comentario: "", savedAt: null };
      const newChecked = [...areaStatus.checkedItems];
      newChecked[itemIdx] = !newChecked[itemIdx];
      return { ...prev, [areaId]: { ...areaStatus, checkedItems: newChecked } };
    });
  }

  function changeValor(areaId, campoId, valor) {
    setStatus((prev) => {
      const areaStatus = prev[areaId] || { checkedItems: [], valores: {}, comentario: "", savedAt: null };
      return {
        ...prev,
        [areaId]: { ...areaStatus, valores: { ...(areaStatus.valores || {}), [campoId]: valor } },
      };
    });
  }

  function changeComentario(areaId, texto) {
    setStatus((prev) => ({
      ...prev,
      [areaId]: { ...(prev[areaId] || { checkedItems: [], valores: {}, comentario: "", savedAt: null }), comentario: texto },
    }));
  }

  function saveArea(areaId) {
    setStatus((prev) => {
      const novo = {
        ...prev,
        [areaId]: { ...(prev[areaId] || { checkedItems: [], valores: {}, comentario: "", savedAt: null }), savedAt: Date.now() },
      };
      // Sincroniza com Supabase em background (sem bloquear a UI)
      if (usuario && usuario.id) {
        const s = novo[areaId];
        const area = AREAS.find((a) => a.id === areaId);
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, "0");
        const dd = String(today.getDate()).padStart(2, "0");
        supaUpsertRegistro({
          usuario_id: usuario.id,
          usuario_nome: `${usuario.nome} ${usuario.sobrenome}`,
          tipo_rotina: tipoRotina,
          data: `${yyyy}-${mm}-${dd}`,
          area_id: areaId,
          area_nome: area ? area.nome : String(areaId),
          checked_items: s.checkedItems || [],
          valores: s.valores || {},
          comentario: s.comentario || "",
        }).catch(() => {}); // falha silenciosa — dados já estão no localStorage
      }
      return novo;
    });
  }

  function resetarRotina() {
    setStatus(estadoInicial(AREAS));
    setFotosPorArea({});
  }

  const openArea = AREAS.find((a) => a.id === openAreaId);

  // Formata os campos estruturados preenchidos de uma área (ex: Queimador 1, Bomba de Vácuo 2...)
  // no padrão: "Queimador 1 - Temp: 127°C, Set point: 135°C"
  function formatarValoresArea(area, s) {
    const valores = (s && s.valores) || {};
    const linhas = [];
    area.itens.forEach((item) => {
      if (typeof item === "string") return;
      const partes = item.campos
        .map((c) => {
          const v = valores[c.id];
          if (!v || !v.toString().trim()) return null;
          const unidade = c.unidade ? c.unidade : "";
          return `${c.label}: ${v}${unidade}`;
        })
        .filter(Boolean);
      if (partes.length > 0) {
        linhas.push(`${item.label} - ${partes.join(", ")}`);
      }
    });
    return linhas;
  }

  const reportText = useMemo(() => {
    const linhas = [];
    linhas.push(`RELATÓRIO DE ROTINA DE MANUTENÇÃO — ${rotinaAtual.label.toUpperCase()}`);
    linhas.push(`Data: ${formatarDataLonga(today)}`);
    linhas.push(`Progresso geral: ${totalChecked}/${TOTAL_ITENS} itens verificados`);
    linhas.push("");

    AREAS.forEach((area, idx) => {
      const s = status[area.id] || { checkedItems: [], valores: {}, comentario: "" };
      const checked = area.itens.filter((item, i) => itemEstaCompleto(item, i, s)).length;

      if (idx > 0) linhas.push("");

      linhas.push(`*${area.nome}*: "${checked}/${area.itens.length}"`);

      const valoresFormatados = formatarValoresArea(area, s);
      valoresFormatados.forEach((linha) => linhas.push(`> ${linha}`));

      if (s.comentario && s.comentario.trim().length > 0) {
        linhas.push(`> ${s.comentario.trim()}`);
      }
    });

    linhas.push("");
    linhas.push(`Fim do relatório — gerado em ${formatarDataCurta(today)}`);
    return linhas.join("\n");
  }, [status, today, totalChecked, AREAS, rotinaAtual, TOTAL_ITENS]);

  function abrirRelatorioFotos() {
    const areasComFoto = AREAS.filter((a) => (fotosPorArea[a.id] || []).length > 0);
    const win = window.open("", "_blank");
    if (!win) return;

    const blocos = areasComFoto
      .map((area) => {
        const s = status[area.id] || { comentario: "" };
        const fotosHtml = (fotosPorArea[area.id] || [])
          .map(
            (f) => `<img src="${f.dataUrl}" alt="${area.nome}" />`
          )
          .join("");
        const comentarioHtml = s.comentario && s.comentario.trim().length > 0
          ? `<p class="obs">${s.comentario.trim().replace(/</g, "&lt;")}</p>`
          : "";
        return `
          <section>
            <h2>${area.nome}</h2>
            ${comentarioHtml}
            <div class="grid">${fotosHtml}</div>
          </section>`;
      })
      .join("");

    const html = `
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Relatório de fotos — ${rotinaAtual.label}</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    color: #14171C;
    margin: 0;
    padding: 32px;
  }
  header {
    margin-bottom: 24px;
    border-bottom: 2px solid #14171C;
    padding-bottom: 12px;
  }
  header h1 { font-size: 20px; margin: 0 0 4px; }
  header p { font-size: 13px; color: #555; margin: 2px 0; }
  section {
    margin-bottom: 28px;
    page-break-inside: avoid;
  }
  section h2 {
    font-size: 15px;
    background: #14171C;
    color: white;
    display: inline-block;
    padding: 4px 12px;
    border-radius: 6px;
    margin: 0 0 8px;
  }
  .obs {
    font-size: 13px;
    color: #333;
    background: #F4F4F4;
    border-left: 3px solid #999;
    padding: 8px 12px;
    margin: 0 0 10px;
    border-radius: 4px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .grid img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid #ddd;
  }
  @media print {
    body { padding: 12px; }
  }
</style>
</head>
<body>
  <header>
    <h1>Relatório de fotos — Rotina ${rotinaAtual.label}</h1>
    <p>${formatarDataLonga(today)}</p>
    <p>${totalFotos} foto(s) em ${areasComFoto.length} área(s)</p>
  </header>
  ${blocos || '<p>Nenhuma foto anexada ainda.</p>'}
</body>
</html>`;

    win.document.open();
    win.document.write(html);
    win.document.close();
    win.focus();
    setTimeout(() => win.print(), 400);
  }

  function handleSendWhatsapp() {
    const encoded = encodeURIComponent(reportText);
    const base = telefone.trim()
      ? `https://wa.me/55${telefone.replace(/\D/g, "")}`
      : `https://wa.me/`;
    const url = `${base}?text=${encoded}`;
    window.open(url, "_blank");
  }

  if (!isReady) {
    return (
      <div
        className="flex min-h-full w-full items-center justify-center"
        style={{ background: "#0E1116" }}
      >
        <div className="flex flex-col items-center gap-3">
          <div
            className="h-8 w-8 animate-spin rounded-full"
            style={{
              border: `3px solid ${tema.accentRgbLow}`,
              borderTopColor: tema.accent,

          />
          <span className="text-[13px]" style={{ color: "rgba(255,255,255,0.45)" }}>
            Carregando rotina de hoje...

  return (
    <div
      className="relative min-h-full w-full"

        background: "#0E1116",

    >
      {/* Modal de login — exibido quando não há sessão ativa */}
      {!usuario && (
        <LoginModal onLogin={(u) => setUsuario(u)} />
      )}

      {/* Textura sutil de fundo */}
      <div
        className="pointer-events-none fixed inset-0 opacity-[0.4] transition-opacity duration-300"
        style={{
          backgroundImage: `radial-gradient(circle at 15% 0%, ${tema.accentSoft2}, transparent 40%), radial-gradient(circle at 85% 100%, rgba(61,220,132,0.06), transparent 40%)`,
        }}
      />

      <div className="relative mx-auto flex max-w-md flex-col px-4 pb-40 pt-6">
        {/* Seletor de rotina */}
        <div
          className="mb-4 flex rounded-2xl p-1"
          style={{ background: "rgba(28,33,40,0.9)", border: "1px solid rgba(255,255,255,0.07)" }}
        >
          {Object.entries(ROTINAS).map(([key, r]) => {
            const ativo = key === tipoRotina;
            const Icon = key === "mecanica" ? Wrench : key === "eletrica" ? Zap : Send;
            return (
              <button
                key={key}
                onClick={() => setTipoRotina(key)}
                className="flex flex-1 items-center justify-center gap-2 rounded-xl py-2.5 text-[13px] font-semibold transition-all duration-200"
                style={{
                  background: ativo ? r.tema.gradient : "transparent",
                  color: ativo ? "#14171C" : "rgba(255,255,255,0.5)",
                }}
              >
                <Icon size={15} strokeWidth={2.3} />
                {r.label}
              </button>
            );
          })}
        </div>

        {/* Header */}
        <div className="mb-5 flex items-center justify-between">
          <div>
            <div
              className="font-mono text-[11px] font-medium uppercase tracking-wider transition-colors duration-300"
              style={{ color: tema.accent }}
            >
              Rotina diária — {rotinaAtual.label}
            </div>
            <h1 className="text-[20px] font-bold leading-tight text-white">
              {usuario ? `${saudacao}, ${usuario.nome}!` : "Checklist de manutenção"}
            </h1>
            <p className="mt-0.5 text-[12.5px]" style={{ color: "rgba(255,255,255,0.4)" }}>
              {formatarDataLonga(today)}
            </p>

            {/* Resumo do dia anterior */}
            {(resumoDiaAnterior.mecanica || resumoDiaAnterior.eletrica) && (
              <div
                className="mt-2.5 rounded-xl px-3 py-2"
                style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.07)" }}
              >
                <p className="mb-1 text-[10px] font-medium uppercase tracking-wide" style={{ color: "rgba(255,255,255,0.35)" }}>
                  Ontem
                </p>
                <div className="flex flex-col gap-0.5">
                  {resumoDiaAnterior.mecanica && (
                    <p className="text-[12px]" style={{ color: "rgba(255,255,255,0.6)" }}>
                      <span style={{ color: "#F5A623" }}>Mecânica</span>{" "}
                      — {resumoDiaAnterior.mecanica.concluidos}/{resumoDiaAnterior.mecanica.total} itens
                      {" "}({resumoDiaAnterior.mecanica.percentual}%)
                    </p>
                  )}
                  {resumoDiaAnterior.eletrica && (
                    <p className="text-[12px]" style={{ color: "rgba(255,255,255,0.6)" }}>
                      <span style={{ color: "#3B82F6" }}>Elétrica</span>{" "}
                      — {resumoDiaAnterior.eletrica.concluidos}/{resumoDiaAnterior.eletrica.total} itens
                      {" "}({resumoDiaAnterior.eletrica.percentual}%)
                    </p>
                  )}
                </div>
              </div>
            )}

            {loadError && (
              <p className="mt-1 text-[11px] font-medium" style={{ color: "#F0997B" }}>
                ⚠ Não foi possível carregar o progresso salvo ({loadError}). Começando do zero.
              </p>
            )}
          </div>
          <div className="flex flex-col items-end gap-1.5">
            <span
              className="flex items-center gap-1.5 text-[10.5px] font-medium"
              style={{
                color:
                  saveState === "error"
                    ? "#F0997B"
                    : saveState === "saving"
                    ? "rgba(255,255,255,0.35)"
                    : saveState === "saved"
                    ? "#3DDC84"
                    : "rgba(255,255,255,0.3)",
              }}
            >
              <span
                className="h-1.5 w-1.5 rounded-full"
                style={{
                  background:
                    saveState === "error"
                      ? "#E24B4A"
                      : saveState === "saving"
                      ? "rgba(255,255,255,0.35)"
                      : saveState === "saved"
                      ? "#3DDC84"
                      : "rgba(255,255,255,0.25)",
                }}
              />
              {saveState === "error"
                ? "Falha ao salvar"
                : saveState === "saving"
                ? "Salvando..."
                : saveState === "saved"
                ? "Progresso salvo"
                : "Pronto"}
            </span>
            <button
              onClick={() => setResetConfirm(true)}
              className="text-[10.5px] font-medium underline"
              style={{ color: "rgba(255,255,255,0.3)" }}
            >
              Reiniciar rotina
            </button>
          </div>
        </div>

        {/* Painel de progresso geral */}
        <div
          className="mb-5 flex items-center gap-4 rounded-2xl p-4"
          style={{
            background: "rgba(28,33,40,0.9)",
            border: "1px solid rgba(255,255,255,0.07)",
          }}
        >
          <ProgressRing progress={overallProgress} size={56} stroke={5} color={tema.accent} />
          <div className="flex-1">
            <div className="text-[18px] font-bold text-white">
              {totalChecked}/{TOTAL_ITENS}
              <span className="ml-1.5 text-[12px] font-normal" style={{ color: "rgba(255,255,255,0.4)" }}>
                itens verificados
              </span>
            </div>
            <div className="mt-1 flex gap-3 text-[11.5px]" style={{ color: "rgba(255,255,255,0.45)" }}>
              <span className="flex items-center gap-1">
                <CheckCircle2 size={12} style={{ color: "#3DDC84" }} />
                {areasSalvas} áreas concluídas
              </span>
              <span className="flex items-center gap-1">
                <MessageSquarePlus size={12} style={{ color: tema.accent }} />
                {areasComObservacao} c/ observações
              </span>
            </div>
          </div>
        </div>

        {/* Grid de áreas */}
        {AREAS.length === 0 ? (
          <div
            className="flex flex-col items-center gap-3 rounded-2xl px-6 py-12 text-center"
            style={{ background: "rgba(28,33,40,0.9)", border: "1px dashed rgba(255,255,255,0.12)" }}
          >
            <div
              className="flex h-12 w-12 items-center justify-center rounded-2xl"
              style={{ background: tema.accentSoft, color: tema.accent }}
            >
              <Send size={22} strokeWidth={2} />
            </div>
            <div>
              <h3 className="mb-1 text-[15px] font-semibold text-white">Checklist em construção</h3>
              <p className="text-[13px]" style={{ color: "rgba(255,255,255,0.5)" }}>
                A rotina de Start up ainda não tem itens cadastrados. Em breve.
              </p>
            </div>
          </div>
        ) : (
          <div className="grid grid-cols-2 gap-3">
            {AREAS.map((area) => (
              <AreaCard
                key={area.id}
                area={area}
                status={status[area.id]}
                onOpen={setOpenAreaId}
                tema={tema}
                fotoCount={(fotosPorArea[area.id] || []).length}
              />
            ))}
          </div>
        )}
      </div>

      {/* Botões flutuantes de gerar relatório */}
      <div className="fixed inset-x-0 bottom-0 z-40 mx-auto flex max-w-md flex-col gap-2 px-4 pb-5">

        {/* Botão "Ontem" — aparece sempre (carregando ou com dados) */}
        {(carregandoOntem || reportTextOntem) && (
          <button
            onClick={() => !carregandoOntem && setReportOntemOpen(true)}
            disabled={carregandoOntem}
            className="flex w-full items-center justify-center gap-2 rounded-2xl py-3 text-[13px] font-medium shadow-lg transition-all active:scale-[0.98]"
            style={{
              background: "rgba(28,33,40,0.97)",
              color: carregandoOntem ? "rgba(255,255,255,0.3)" : "rgba(255,255,255,0.55)",
              border: "1px solid rgba(255,255,255,0.1)",
            }}
          >
            <Circle size={13} strokeWidth={2} />
            {carregandoOntem ? "Buscando relatório de ontem..." : "Ver relatório de ontem (todos os usuários)"}
          </button>
        )}

        <div className="flex gap-2">
          <button
            onClick={() => setReportOpen(true)}
            className="flex flex-1 items-center justify-center gap-2 rounded-2xl py-4 text-[14.5px] font-semibold shadow-2xl transition-all active:scale-[0.98] duration-300"
            style={{
              background: tema.gradient,
              color: "#14171C",

          >
            <FileText size={17} strokeWidth={2.3} />

          <button

            className="flex items-center justify-center gap-2 rounded-2xl px-4 py-4 text-[14.5px] font-semibold shadow-2xl transition-all active:scale-[0.98] duration-300"
            style={{
              background: totalFotos === 0 ? "rgba(255,255,255,0.06)" : "rgba(28,33,40,0.95)",
              color: totalFotos === 0 ? "rgba(255,255,255,0.3)" : "white",
              border: "1px solid rgba(255,255,255,0.12)",

          >

      </div>

      {/* Modais */}
      {openArea && status[openArea.id] && (

          status={status[openArea.id]}
          onClose={() => setOpenAreaId(null)}
          onToggleItem={toggleItem}
          onChangeValor={changeValor}
          onChangeComentario={changeComentario}
          onSave={saveArea}
          tema={tema}
          fotos={fotosPorArea[openArea.id]}
          onAddFotos={addFotos}
          onRemoveFoto={removeFoto}
        />
      )}

      <ReportModal
        open={reportOpen}
        onClose={() => setReportOpen(false)}
        reportText={reportText}
        onSendWhatsapp={handleSendWhatsapp}
        telefone={telefone}
        setTelefone={setTelefone}
      />

      {/* Modal relatório do dia anterior */}
      {reportOntemOpen && reportTextOntem && (
        <ReportModal
          open={reportOntemOpen}
          onClose={() => setReportOntemOpen(false)}
          reportText={reportTextOntem}
          onSendWhatsapp={() => {
            const encoded = encodeURIComponent(reportTextOntem);
            const url = telefone
              ? `https://wa.me/55${telefone.replace(/\D/g, "")}?text=${encoded}`
              : `https://wa.me/?text=${encoded}`;
            window.open(url, "_blank");
          }}
          telefone={telefone}
          setTelefone={setTelefone}

      {resetConfirm && (
        <div
          className="fixed inset-0 z-50 flex items-center justify-center px-6"
          style={{ background: "rgba(8,10,13,0.75)", backdropFilter: "blur(4px)" }}
          onClick={() => setResetConfirm(false)}
        >
          <div
            onClick={(e) => e.stopPropagation()}
            className="w-full max-w-sm rounded-2xl p-5"
            style={{ background: "#181B21", border: "1px solid rgba(255,255,255,0.08)" }}
          >
            <div className="mb-3 flex items-center gap-2.5">
              <div
                className="flex h-9 w-9 items-center justify-center rounded-xl"
                style={{ background: "rgba(226,75,74,0.14)", color: "#E24B4A" }}
              >
                <AlertTriangle size={17} />
              </div>
              <h3 className="text-[15px] font-semibold text-white">

              </h3>
            </div>
            <p className="mb-4 text-[13px] leading-relaxed" style={{ color: "rgba(255,255,255,0.55)" }}>
              Todos os itens marcados e observações de hoje na rotina <strong>{rotinaAtual.label.toLowerCase()}</strong> serão apagados. A outra rotina não é afetada. Essa ação não pode ser desfeita.
            </p>
            <div className="flex gap-2">
              <button
                onClick={() => setResetConfirm(false)}
                className="flex-1 rounded-xl py-2.5 text-[13px] font-medium"
                style={{ background: "rgba(255,255,255,0.06)", color: "rgba(255,255,255,0.8)" }}
              >
                Cancelar
              </button>
              <button
                onClick={() => {
                  resetarRotina();
                  setResetConfirm(false);
                }}
                className="flex-1 rounded-xl py-2.5 text-[13px] font-semibold"
                style={{ background: "#E24B4A", color: "white" }}
              >
                Reiniciar
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

</script>
<script type="text/babel" data-presets="react">
ReactDOM.createRoot(document.getElementById("root")).render(<MaintenanceApp />);
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").then((reg) => {
        // Força checagem imediata de atualização do Service Worker
        reg.update();

        // Quando um novo Service Worker assume o controle, a versão em cache
        // mudou — recarrega a página automaticamente para que o usuário veja
        // o conteúdo novo sem precisar fazer nada manualmente.
        let jaRecarregou = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (jaRecarregou) return;
          jaRecarregou = true;
          window.location.reload();
        });
      }).catch(() => {});
    });
  }
</script>
